name: Deepiri CI - deepiri-aarflingo

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [ingest, perception, forecast, feedback, runtime]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: python -m pip install poetry

      - name: Install service dependencies
        working-directory: services/${{ matrix.service }}
        run: poetry install --no-interaction --no-ansi

      - name: Unit tests
        working-directory: services/${{ matrix.service }}
        env:
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/services/${{ matrix.service }}
        run: |
          if [ -d tests ]; then
            poetry run pytest -q
          else
            echo "No tests/ directory — install-only check passed"
          fi

  core-metrics:
    name: Core metrics
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run anticipate metric smoke
        run: python core/metrics/test_anticipate.py

  gate:
    name: AARF gate (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: lib/aarf-gate/package-lock.json

      - name: Install dependencies
        working-directory: lib/aarf-gate
        run: npm ci

      - name: Run tests
        working-directory: lib/aarf-gate
        run: npm test

  studio:
    name: AARF Studio build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/aarf-studio/package-lock.json

      - name: Install dependencies
        working-directory: apps/aarf-studio
        run: npm ci

      - name: Build
        working-directory: apps/aarf-studio
        run: npm run build
