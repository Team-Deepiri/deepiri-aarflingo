name: Deepiri CI - deepiri-aarflingo

on:
  pull_request:
    branches: [main, dev]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "notebooks/**"
      - "LICENSE"
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "notebooks/**"
      - "LICENSE"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Python (core + services)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install tooling
        run: python -m pip install poetry pytest pyyaml numpy

      - name: Core tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python core/metrics/test_anticipate.py
          python -m pytest -q core/tests
          cd lib/aarf-physio && python -m pip install poetry && poetry install --no-interaction --no-ansi && poetry run pytest -q

      - name: Service tests
        run: |
          set -euo pipefail
          for svc in ingest perception forecast feedback runtime audio; do
            echo "==> services/$svc"
            (
              cd "${{ github.workspace }}/services/$svc"
              poetry install --no-interaction --no-ansi
              export PYTHONPATH="${{ github.workspace }}:${{ github.workspace }}/services/$svc"
              if [ -d tests ]; then
                poetry run pytest -q
              else
                echo "No tests/ directory — install-only check passed"
              fi
            )
          done

  js:
    name: JS (gate + studio)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: AARF gate
        working-directory: lib/aarf-gate
        run: |
          npm ci
          npm test

      - name: Sync branding
        run: bash scripts/sync-branding.sh

      - name: Studio build
        working-directory: apps/aarf-studio
        run: |
          npm ci
          npm run build
