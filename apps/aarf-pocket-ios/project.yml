name: AarflingoPocket
options:
  bundleIdPrefix: dev.deepiri
  deploymentTarget:
    iOS: "16.0"
settings:
  SWIFT_VERSION: "5.9"
targets:
  AarflingoPocket:
    type: application
    platform: iOS
    sources:
      - path: AarflingoPocket
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: dev.deepiri.aarflingo-pocket
      INFOPLIST_FILE: AarflingoPocket/Info.plist
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      TARGETED_DEVICE_FAMILY: "1,2"
      CURRENT_PROJECT_VERSION: 1
      MARKETING_VERSION: 0.1.0
    info:
      path: AarflingoPocket/Info.plist
      properties:
        UILaunchScreen: {}
        NSCameraUsageDescription: Camera access for live dog intent preview (ML coming soon).
        NSMicrophoneUsageDescription: Microphone for bark audio (ML coming soon).
